<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egipto Puzzles - Local</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<audio id="musicaFondo" loop>
    <source src="arabe.mpeg" type="audio/mpeg">
    Tu navegador no soporta el elemento de audio.
</audio>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "personaje": "./personaje.js",
            "escena": "./escena.js",
            "controles": "./controles.js",
            "caja": "./caja.js",
            "colisiones": "./colisiones.js",
            "botones": "./botones.js", 
            "puertas": "./Puertas.js",
            "menu": "./Menu.js", 
            "papiroIntro": "./PapiroIntro.js",
            "dialogos": "./Dialogos.js",
            "medina": "./Medina.js" 
        }
    }
</script>

   <div id="debug-info" style="
    display: none;
    position: absolute; 
    top: 20px; 
    left: 20px; 
    background: rgba(0, 0, 0, 0.8); 
    color: #FFD700; 
    font-family: 'Arial', sans-serif; 
    padding: 15px; 
    border-radius: 10px; 
    border: 2px solid #FFD700;
    pointer-events: none;
    z-index: 1000;
    font-size: 14px;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
">
    <b style="font-size: 16px; display: block; margin-bottom: 8px; border-bottom: 1px solid #FFD700;">CONTROLES</b>
    <div style="display: grid; grid-template-columns: auto auto; gap: 5px 15px;">
        <span>Mover:</span> <b>W, A, S, D</b>
        <span>Cambiar Personaje:</span> <b>Q</b>
        <span>Acción (Cajas):</span> <b>Espacio</b>
    </div>
    <div id="nivel-display" style="margin-top: 10px; color: #fff; font-style: italic;">
        Nivel: 1
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { crearEscena } from 'escena';
    import { Personaje } from 'personaje';
    import { Controles } from 'controles';
    import { Caja } from 'caja';
    import { ejecutarAnimacion } from './animacion.js';
    import { ManejadorColisiones } from 'colisiones';
    import { crearMenu } from 'menu'; 
    import { mostrarPapiroIntro } from 'papiroIntro';
    import { crearSistemaDialogos } from 'dialogos';
    import { cargarMedina } from 'medina';

    const reloj = new THREE.Clock();
    
    // --- LÓGICA DE AUDIO AGREGADA ---
    const musica = document.getElementById('musicaFondo');
    musica.volume = 1; // Ajusta el volumen a tu gusto (0.0 a 1.0)

    const iniciarMusica = () => {
        musica.play().catch(e => console.log("Esperando interacción para audio"));
        // Removemos el evento una vez que ya empezó a sonar
        window.removeEventListener('click', iniciarMusica);
        window.removeEventListener('keydown', iniciarMusica);
    };

    // Escuchamos un clic o una tecla para activar el audio
    window.addEventListener('click', iniciarMusica);
    window.addEventListener('keydown', iniciarMusica);
    // --------------------------------

    window.medinaRef = null; 

    crearSistemaDialogos(); 

    const { scene, listaAntorchas } = crearEscena(); 
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    camera.position.set(-3, 15, 15); 
    camera.lookAt(0, 0, 0);

    const colisionador = new ManejadorColisiones();

    const listaCajas = [
        new Caja(scene, -15, 2),
        new Caja(scene, -12, -2),
        new Caja(scene, -8, 1)
    ];

    const nina = new Personaje(scene, 'assets/nina.glb', -18, 0, colisionador);
    const nino = new Personaje(scene, 'assets/nino.glb', -16, 0, colisionador); 
    
    colisionador.registrarPersonajes([nina, nino]);
    const input = new Controles();

    window.medinaRef = cargarMedina(scene);

    crearMenu(() => {
        // Al darle a "Jugar" en el menú, también intentamos disparar la música si no ha sonado
        iniciarMusica();
        mostrarPapiroIntro(() => {
            ejecutarAnimacion(renderer, scene, camera, nina, nino, input, listaCajas, listaAntorchas);
        });
    });

    function loopPrincipal() {
        requestAnimationFrame(loopPrincipal);
        const delta = reloj.getDelta();
        
        if (window.medinaRef && window.medinaRef.actualizar) {
            window.medinaRef.actualizar(delta);
        }
    }
    loopPrincipal();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
